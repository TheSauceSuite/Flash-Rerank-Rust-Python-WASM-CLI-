<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">Flash-Rerank Latency Scaling</text>
  <text x="400" y="55" text-anchor="middle" fill="#7d8590" font-size="12">P50 latency by batch size · CPU INT8 parallel · MiniLM-L-6-v2</text>

  <!-- Grid lines -->
  <line x1="180" y1="75" x2="180" y2="275" stroke="#21262d" stroke-width="1"/>
  <line x1="310" y1="75" x2="310" y2="275" stroke="#21262d" stroke-width="1"/>
  <line x1="440" y1="75" x2="440" y2="275" stroke="#21262d" stroke-width="1"/>
  <line x1="570" y1="75" x2="570" y2="275" stroke="#21262d" stroke-width="1"/>
  <line x1="700" y1="75" x2="700" y2="275" stroke="#21262d" stroke-width="1"/>

  <!-- Grid labels -->
  <text x="180" y="292" text-anchor="middle" fill="#7d8590" font-size="10">0</text>
  <text x="310" y="292" text-anchor="middle" fill="#7d8590" font-size="10">20ms</text>
  <text x="440" y="292" text-anchor="middle" fill="#7d8590" font-size="10">40ms</text>
  <text x="570" y="292" text-anchor="middle" fill="#7d8590" font-size="10">60ms</text>
  <text x="700" y="292" text-anchor="middle" fill="#7d8590" font-size="10">80ms</text>

  <!-- 1 doc -->
  <text x="170" y="103" text-anchor="end" fill="#e6edf3" font-size="13" font-weight="500">1 doc</text>
  <rect x="180" y="90" width="18" height="28" rx="4" fill="url(#bar1)"/>
  <text x="208" y="109" fill="#a5b4fc" font-size="13" font-weight="700">2.7 ms</text>
  <text x="272" y="109" fill="#7d8590" font-size="10">353 QPS</text>

  <!-- 10 docs -->
  <text x="170" y="153" text-anchor="end" fill="#e6edf3" font-size="13" font-weight="500">10 docs</text>
  <rect x="180" y="140" width="67" height="28" rx="4" fill="url(#bar1)"/>
  <text x="257" y="159" fill="#a5b4fc" font-size="13" font-weight="700">10.3 ms</text>
  <text x="330" y="159" fill="#7d8590" font-size="10">96 QPS</text>

  <!-- 50 docs -->
  <text x="170" y="203" text-anchor="end" fill="#e6edf3" font-size="13" font-weight="500">50 docs</text>
  <rect x="180" y="190" width="257" height="28" rx="4" fill="url(#bar1)"/>
  <text x="447" y="209" fill="#a5b4fc" font-size="13" font-weight="700">39.5 ms</text>
  <text x="520" y="209" fill="#7d8590" font-size="10">25 QPS</text>

  <!-- 100 docs -->
  <text x="170" y="253" text-anchor="end" fill="#e6edf3" font-size="13" font-weight="500">100 docs</text>
  <rect x="180" y="240" width="468" height="28" rx="4" fill="url(#bar1)"/>
  <text x="658" y="259" fill="#a5b4fc" font-size="13" font-weight="700">72 ms</text>
</svg>
